<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMPTIERS - Rankings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#141518;
  --bg2:#1a1b1e;
  --bg3:#1e2024;
  --bg4:#25272c;
  --bg5:#2c2e33;
  --border:#2a2d38;
  --border2:#33374a;
  --text:#d8dae8;
  --muted:#6b7099;
  --muted2:#3d4160;
  --accent:#5865f2;
  --accent2:#7289da;

  --HT1-bg:#7c2d12;--HT1-text:#fb923c;--HT1-border:#9a3412;
  --HT2-bg:#78350f;--HT2-text:#fbbf24;--HT2-border:#92400e;
  --HT3-bg:#713f12;--HT3-text:#f59e0b;--HT3-border:#854d0e;
  --LT1-bg:#14532d;--LT1-text:#4ade80;--LT1-border:#166534;
  --LT2-bg:#164e63;--LT2-text:#38bdf8;--LT2-border:#0e7490;
  --LT3-bg:#312e81;--LT3-text:#a78bfa;--LT3-border:#3730a3;
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100%}

/* TOPBAR */
.topbar{
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 28px;
  position:sticky;top:0;z-index:100;
}
.logo{
  font-size:20px;font-weight:900;
  letter-spacing:2px;padding:15px 0;margin-right:32px;
  text-decoration:none;flex-shrink:0;white-space:nowrap;
  font-family:'Inter',sans-serif;
  image-rendering:pixelated;
}
.logo .smp{
  background:linear-gradient(180deg,#e8c44a 0%,#c87c1a 40%,#7a3a0a 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow:none;
  filter:drop-shadow(1px 1px 0 rgba(0,0,0,0.8));
}
.logo .tiers{
  background:linear-gradient(180deg,#6dbd3c 0%,#3a8a18 40%,#1a5008 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow:none;
  filter:drop-shadow(1px 1px 0 rgba(0,0,0,0.8));
}
.modetabs{display:flex;overflow-x:auto;flex:1;scrollbar-width:none;gap:6px;padding:10px 0}
.modetabs::-webkit-scrollbar{display:none}
.modetab{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:10px 20px;color:var(--muted);cursor:pointer;
  border:1px solid var(--border);background:var(--bg3);
  border-radius:8px;border-bottom:2px solid transparent;
  white-space:nowrap;transition:all .15s;font-size:13px;
  font-family:'Inter',sans-serif;min-width:72px;
}
.modetab:hover{color:var(--text);border-color:var(--border2);background:var(--bg4)}
.modetab.active{color:var(--text);border-color:var(--accent2);background:rgba(114,137,218,.12);border-bottom-color:var(--accent2)}
.modetab-icon{font-size:26px;line-height:1}
.topright{display:flex;align-items:center;gap:10px;padding:10px 0;flex-shrink:0}
.editbtn{
  display:flex;align-items:center;gap:6px;padding:7px 16px;
  border-radius:6px;border:1px solid var(--border2);
  background:var(--bg3);color:var(--muted);font-size:13px;
  cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;
  position:fixed;bottom:20px;left:20px;z-index:500;
  box-shadow:0 4px 16px rgba(0,0,0,0.4);
}
.editbtn:hover{color:var(--text);border-color:var(--border2)}
.editbtn.on{border-color:var(--accent);color:var(--accent2);background:rgba(88,101,242,.1)}

/* MAIN */
.main{max-width:1100px;margin:0 auto;padding:28px 24px}

/* LEADERBOARD */
.lb-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;
}
.lb-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:500}
.add-btn{
  display:flex;align-items:center;gap:6px;padding:7px 16px;
  border-radius:6px;border:1px solid var(--border2);
  background:var(--bg3);color:var(--muted);font-size:13px;
  cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;
}
.add-btn:hover{color:var(--text);border-color:var(--accent)}
.search-wrap{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;display:flex;align-items:center;
  gap:10px;padding:0 14px;margin-bottom:14px;
}
.search-wrap input{
  flex:1;background:none;border:none;color:var(--text);
  padding:11px 0;font-size:14px;font-family:'Inter',sans-serif;
}
.search-wrap input::placeholder{color:var(--muted2)}
.search-wrap input:focus{outline:none}
.search-ico{color:var(--muted);font-size:16px}

/* TABLE - CLEAN MCTIERS STYLE */
.lb-list{display:flex;flex-direction:column;gap:4px;}
.lb-row{
  display:flex;align-items:stretch;
  border-radius:10px;overflow:hidden;
  background:var(--bg2);
  border:1px solid var(--border);
  border-left:4px solid var(--row-accent,var(--border));
  transition:background .12s,border-color .12s,opacity .2s;
  position:relative;
}
.lb-row:hover{background:var(--bg3);border-color:var(--row-accent,var(--border2));}
.lb-row.drag-over{outline:2px dashed var(--accent);opacity:0.6}

/* rank accent colors per tier */
.lb-row.accent-HT1{--row-accent:#c87c1a}
.lb-row.accent-HT2{--row-accent:#c9960c}
.lb-row.accent-HT3{--row-accent:#b8860b}
.lb-row.accent-LT1{--row-accent:#2e8b57}
.lb-row.accent-LT2{--row-accent:#1e6091}
.lb-row.accent-LT3{--row-accent:#6a0dad}
.lb-row.accent-none{--row-accent:#2a2d38}

.rank-cell{
  display:flex;align-items:center;justify-content:center;
  width:64px;flex-shrink:0;
  font-size:20px;font-weight:800;color:var(--muted2);
  letter-spacing:-0.5px;
}
.rank-cell.r1{color:#f59e0b}
.rank-cell.r2{color:#94a3b8}
.rank-cell.r3{color:#b45309}

/* PLAYER CARD */
.player-card-cell{flex:1;min-width:0;}
.player-card{
  display:flex;align-items:center;gap:0;
  background:transparent;
  width:100%;height:100%;
}
.skin-banner{
  width:76px;height:76px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;position:relative;overflow:hidden;
}
.skin-banner img{
  width:56px;height:56px;
  image-rendering:pixelated;
}
.player-info{padding:10px 14px;flex:1;min-width:0;}
.player-name{font-size:22px;font-weight:700;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player-sub{font-size:14px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:5px}

.region-badge{
  display:inline-flex;align-items:center;justify-content:center;
  padding:5px 12px;border-radius:6px;font-size:12px;font-weight:700;
  letter-spacing:.5px;flex-shrink:0;
}
.reg-ID{background:rgba(124,45,18,.5);color:#fb923c;border:1px solid #9a3412}
.reg-AS{background:rgba(20,83,45,.5);color:#4ade80;border:1px solid #166534}
.reg-NA{background:rgba(30,58,95,.5);color:#60a5fa;border:1px solid #1e4080}
.reg-EU{background:rgba(49,46,129,.5);color:#a78bfa;border:1px solid #3730a3}
.reg-AU{background:rgba(22,78,99,.5);color:#38bdf8;border:1px solid #0e7490}
.reg-OTHER{background:rgba(31,41,55,.5);color:#9ca3af;border:1px solid #374151}

.tiers-cell{padding:0 14px;display:flex;align-items:center;}
.tiers-row{display:flex;flex-wrap:nowrap;gap:8px;align-items:center}
.tier-badge{
  display:inline-flex;align-items:center;justify-content:center;
  padding:3px 10px;border-radius:5px;font-size:12px;font-weight:700;
  letter-spacing:.3px;border:1px solid transparent;white-space:nowrap;
  margin-top:2px;
}
.tier-badge.HT1{background:var(--HT1-bg);color:var(--HT1-text);border-color:var(--HT1-border)}
.tier-badge.HT2{background:var(--HT2-bg);color:var(--HT2-text);border-color:var(--HT2-border)}
.tier-badge.HT3{background:var(--HT3-bg);color:var(--HT3-text);border-color:var(--HT3-border)}
.tier-badge.LT1{background:var(--LT1-bg);color:var(--LT1-text);border-color:var(--LT1-border)}
.tier-badge.LT2{background:var(--LT2-bg);color:var(--LT2-text);border-color:var(--LT2-border)}
.tier-badge.LT3{background:var(--LT3-bg);color:var(--LT3-text);border-color:var(--LT3-border)}
.tier-badge.none{background:transparent;color:var(--muted2);border:none;font-weight:400}
.tier-mode-lbl{font-size:11px;color:var(--muted);margin-top:2px;text-align:center;letter-spacing:.3px}
.tier-with-mode{display:flex;flex-direction:column;align-items:center;gap:2px}

/* TIER LIST */
.tierlist-wrap{display:flex;flex-direction:column;gap:3px}
.tier-row{
  display:flex;align-items:stretch;
  border-radius:8px;overflow:hidden;border:1px solid var(--border);
}
.tier-label{
  width:64px;display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;flex-shrink:0;letter-spacing:.5px;
}
.tier-label.HT1{background:var(--HT1-bg);color:var(--HT1-text);border-right:1px solid var(--HT1-border)}
.tier-label.HT2{background:var(--HT2-bg);color:var(--HT2-text);border-right:1px solid var(--HT2-border)}
.tier-label.HT3{background:var(--HT3-bg);color:var(--HT3-text);border-right:1px solid var(--HT3-border)}
.tier-label.LT1{background:var(--LT1-bg);color:var(--LT1-text);border-right:1px solid var(--LT1-border)}
.tier-label.LT2{background:var(--LT2-bg);color:var(--LT2-text);border-right:1px solid var(--LT2-border)}
.tier-label.LT3{background:var(--LT3-bg);color:var(--LT3-text);border-right:1px solid var(--LT3-border)}
.tier-players-wrap{
  flex:1;background:var(--bg2);
  display:flex;flex-wrap:wrap;gap:6px;
  padding:10px 14px;align-items:center;min-height:64px;
}
.pchip{
  display:flex;align-items:center;gap:7px;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:6px;padding:5px 12px 5px 6px;
  cursor:pointer;transition:all .15s;
}
.pchip:hover{border-color:var(--accent);background:var(--bg4)}
.chip-skin{width:30px;height:30px;image-rendering:pixelated;border-radius:4px}
.chip-name{font-size:13px;font-weight:500;color:var(--text)}
.chip-reg{font-size:10px;color:var(--muted)}
.empty-tier{color:var(--muted2);font-size:12px;font-style:italic}
.add-chip{
  display:flex;align-items:center;gap:5px;padding:5px 12px;
  border:1px dashed var(--border2);border-radius:6px;
  color:var(--muted2);font-size:12px;cursor:pointer;
  background:none;font-family:'Inter',sans-serif;transition:all .15s;
}
.add-chip:hover{border-color:var(--accent);color:var(--accent2)}

/* MODAL */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.75);z-index:200;
  align-items:center;justify-content:center;
}
.overlay.open{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:12px;padding:24px;width:460px;
  max-width:calc(100vw - 24px);max-height:90vh;overflow-y:auto;
}
.modal-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:20px}
.field{margin-bottom:14px}
.field label{
  display:block;font-size:11px;color:var(--muted);
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;
}
.field input,.field select{
  width:100%;background:var(--bg);border:1px solid var(--border2);
  border-radius:6px;color:var(--text);padding:9px 12px;
  font-size:13px;font-family:'Inter',sans-serif;transition:border-color .15s;
}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
.skin-preview-row{display:flex;align-items:center;gap:12px;margin-top:8px}
.skin-preview-img{width:52px;height:52px;image-rendering:pixelated;border-radius:6px;border:1px solid var(--border2)}
.skin-hint{font-size:11px;color:var(--muted);line-height:1.5}
.mode-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.mode-field{display:flex;flex-direction:column;gap:5px}
.mode-field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.mode-field select{
  background:var(--bg);border:1px solid var(--border2);border-radius:5px;
  color:var(--text);padding:7px 8px;font-size:12px;font-family:'Inter',sans-serif;
}
.modal-btns{display:flex;gap:8px;margin-top:20px}
.mbtn{
  flex:1;padding:9px;border-radius:6px;border:1px solid var(--border2);
  background:var(--bg3);color:var(--text);font-size:13px;
  cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;
}
.mbtn:hover{background:var(--bg4)}
.mbtn.save{background:rgba(88,101,242,.15);border-color:var(--accent);color:var(--accent2)}
.mbtn.save:hover{background:rgba(88,101,242,.25)}
.mbtn.del{color:#f87171;border-color:#3a1a1a;background:rgba(248,113,113,.05)}
.mbtn.del:hover{background:rgba(248,113,113,.12)}

/* PASSWORD */
.pw-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.82);z-index:300;
  align-items:center;justify-content:center;
}
.pw-overlay.open{display:flex}
.pw-box{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:12px;padding:32px;width:320px;text-align:center;
}
.pw-box h3{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px}
.pw-box p{font-size:12px;color:var(--muted);margin-bottom:20px}
.pw-box input{
  width:100%;background:var(--bg);border:1px solid var(--border2);
  border-radius:6px;color:var(--text);padding:10px 14px;
  font-size:14px;margin-bottom:10px;text-align:center;
  font-family:'Inter',sans-serif;letter-spacing:3px;
}
.pw-box input:focus{outline:none;border-color:var(--accent)}
.pw-err{font-size:12px;color:#f87171;min-height:16px;margin-bottom:10px}
.pw-btn{
  width:100%;padding:10px;border-radius:6px;
  border:1px solid var(--accent);background:rgba(88,101,242,.15);
  color:var(--accent2);font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;
}
.pw-btn:hover{background:rgba(88,101,242,.25)}

/* FOOTER */
.footer{
  text-align:center;padding:28px;color:var(--muted2);
  font-size:12px;border-top:1px solid var(--border);margin-top:40px;
}
.empty-state{text-align:center;padding:60px 0;color:var(--muted2)}
.empty-state b{display:block;font-size:15px;color:var(--muted);margin-bottom:8px;font-weight:500}

@media(max-width:700px){
  .topbar{padding:0 12px}
  .main{padding:16px 12px}
  .modetab{padding:12px 10px;font-size:12px}
  .modetab-icon{font-size:15px}
  .lb-table thead th,.lb-table td{padding:8px 8px}
  .player-card{min-width:160px}
  .skin-banner{width:56px;height:48px}
  .skin-banner img{width:38px;height:38px}
  .mode-grid{grid-template-columns:1fr 1fr}
}

/* MCTiers-style icon circles */
.tier-with-mode{display:flex;flex-direction:column;align-items:center;gap:3px}
.tier-icon-circle{
  width:44px;height:44px;border-radius:50%;
  background:#000;border:2.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.4);
}
.tier-icon-circle img.tier-mode-icon{width:24px;height:24px;object-fit:contain;}
.tier-circle-HT1{background:#000;border-color:#c87c1a}
.tier-circle-HT2{background:#000;border-color:#c9960c}
.tier-circle-HT3{background:#000;border-color:#b8860b}
.tier-circle-LT1{background:#000;border-color:#2e8b57}
.tier-circle-LT2{background:#000;border-color:#1e6091}
.tier-circle-LT3{background:#000;border-color:#6a0dad}
</style>
</head>
<body>

<!-- PASSWORD -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <h3>Editor Mode</h3>
    <p>Enter username and password to edit</p>
    <input type="text" id="unInput" placeholder="Username" onkeydown="if(event.key==='Enter')checkPw()" style="letter-spacing:normal;margin-bottom:8px">
    <input type="password" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="pw-err" id="pwErr"></div>
    <button class="pw-btn" onclick="checkPw()">Masuk</button>
  </div>
</div>

<!-- EDITOR BUTTON (fixed bottom-left) -->
<button class="editbtn" id="editBtn" onclick="requestEdit()">&#9998; Editor</button>

<!-- TOPBAR -->
<div class="topbar">
  <a class="logo" href="#"><span class="smp">SMP</span><span class="tiers">TIERS</span></a>
  <div class="modetabs" id="modetabs"></div>
</div>

<!-- MAIN -->
<div class="main" id="main"></div>

<!-- FOOTER -->
<div class="footer">frostsoftwork.llc &copy; 2026</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add Player</div>
    <div class="field">
      <label>Username Minecraft (IGN)</label>
      <input type="text" id="ignInput" placeholder="cth: Notch" oninput="onIGN()">
      <div class="skin-preview-row">
        <img class="skin-preview-img" id="skinPrev" src="" alt="" style="display:none">
        <div class="skin-hint" id="skinHint">Type username to muat skin otomatis dari Mojang</div>
      </div>
    </div>
    <div class="field">
      <label>Rank (optional)</label>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
        <button onclick="setRankPreset('Combat Master')" id="btnCM" style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s">
          <img id="imgCM" src="" style="width:16px;height:16px;object-fit:contain"> Combat Master
        </button>
        <button onclick="setRankPreset('Combat Ace')" id="btnCA" style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s">
          <img id="imgCA" src="" style="width:16px;height:16px;object-fit:contain"> Combat Ace
        </button>
        <button onclick="setRankPreset('')" style="padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);font-size:12px;cursor:pointer">Auto</button>
      </div>
      <input type="text" id="customRankInput" placeholder="Or type a custom rank..." style="width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:9px 12px;font-size:13px;font-family:'Inter',sans-serif">
      <div style="margin-top:8px">
        <label style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px">CUSTOM RANK LOGO (OPTIONAL)</label>
        <div style="display:flex;align-items:center;gap:12px;margin-top:4px">
          <label for="rankLogoUpload" style="display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);font-size:12px;cursor:pointer" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">
            &#128247; Upload logo
            <input type="file" id="rankLogoUpload" accept="image/*" style="display:none" onchange="onRankLogoUpload(this)">
          </label>
          <img id="rankLogoPreview" style="width:32px;height:32px;border-radius:4px;border:1px solid var(--border2);object-fit:contain;display:none" alt="logo">
          <button id="rankLogoRemoveBtn" onclick="removeRankLogo()" style="display:none;padding:5px 10px;border-radius:5px;border:1px solid #3a1a1a;background:rgba(248,113,113,.05);color:#f87171;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif">Remove</button>
        </div>
      </div>
    </div>
    <div class="field">
      <label>Character photo (optional — overrides auto skin)</label>
      <div style="display:flex;align-items:center;gap:12px;margin-top:4px">
        <label for="photoUpload" style="display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">
          &#128247; Upload photo
          <input type="file" id="photoUpload" accept="image/*" style="display:none" onchange="onPhotoUpload(this)">
        </label>

// --- JSONBin helpers ---
async function jbGet(){
  try{
    const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`,{
      headers:{'X-Master-Key':JSONBIN_API_KEY,'X-Bin-Meta':'false'}
    });
    if(!r.ok) throw new Error('GET failed: '+r.status);
    const data = await r.json();
    return Array.isArray(data) ? data : (data.players||[]);
  }catch(e){
    console.error('JSONBin GET error:',e);
    return JSON.parse(localStorage.getItem('smptiers2_players')||'[]');
  }
}

async function jbSet(data){
  try{
    const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`,{
      method:'PUT',
      headers:{
        'Content-Type':'application/json',
        'X-Master-Key':JSONBIN_API_KEY,
        'X-Bin-Versioning':'false'
      },
      body: JSON.stringify(data)
    });
    if(!r.ok) throw new Error('PUT failed: '+r.status);
    localStorage.setItem('smptiers2_players', JSON.stringify(data));
    return true;
  }catch(e){
    console.error('JSONBin PUT error:',e);
    localStorage.setItem('smptiers2_players', JSON.stringify(data));
    return false;
  }
}

async function save(){
  showSaveIndicator('saving');
  const ok = await jbSet(players);
  showSaveIndicator(ok ? 'saved' : 'offline');
}

function showSaveIndicator(state){
  let el = document.getElementById('saveIndicator');
  if(!el){
    el = document.createElement('div');
    el.id = 'saveIndicator';
    el.style.cssText = 'position:fixed;bottom:18px;right:18px;padding:8px 16px;border-radius:8px;font-size:12px;font-family:Inter,sans-serif;font-weight:600;z-index:9999;transition:opacity .4s;pointer-events:none';
    document.body.appendChild(el);
  }
  if(state==='saving'){
    el.textContent = '⏳ Saving...';
    el.style.background='#1e293b';el.style.color='#94a3b8';el.style.opacity='1';
  } else if(state==='saved'){
    el.textContent = '✅ Saved';
    el.style.background='#052e16';el.style.color='#4ade80';el.style.opacity='1';
    setTimeout(()=>el.style.opacity='0', 2000);
  } else {
    el.textContent = '⚠️ Offline (saved locally)';
    el.style.background='#3a1a00';el.style.color='#fb923c';el.style.opacity='1';
    setTimeout(()=>el.style.opacity='0', 3000);
  }
}

function getTier(p,mode){
  const t=p.tiers[mode];return t&&t!=='-'?t:null;
}
function getOverall(p){
  const vals=MODES.map(m=>p.tiers[m]).filter(t=>t&&t!=='-');
  if(!vals.length)return null;
  return TIERS.find(t=>vals.includes(t))||null;
}
function getScore(p){
  return MODES.reduce((s,m)=>{const t=getTier(p,m);return s+(t?TIER_SCORE[t]:0)},0);
}
function tierBadge(t,label){
  if(!t) return `<span class="tier-badge none">—</span>`;
  if(label){
    const logo = MODE_LOGOS[label];
    const iconHtml = logo ? `<img src="${logo}" class="tier-mode-icon" alt="${label}">` : `<span style="font-size:14px">${label}</span>`;
    return `<div class="tier-with-mode">
      <div class="tier-icon-circle tier-circle-${t}">${iconHtml}</div>
      <span class="tier-badge ${t}">${t}</span>
    </div>`;
  }
  return `<span class="tier-badge ${t}">${t}</span>`;
}
function rankLabel(p){
  if(p.customRank) return p.customRank;
  const ov=getOverall(p);
  if(!ov)return'Unranked';
  if(ov==='HT1')return'Combat Master';
  if(ov==='HT2')return'Elite';
  if(ov==='HT3')return'High Tier';
  if(ov==='LT1')return'Advanced';
  if(ov==='LT2')return'Intermediate';
  return'Beginner';
}
function rankLogo(p){
  const label=rankLabel(p);
  if(p.customRankLogo) return p.customRankLogo;
  return RANK_LOGOS[label]||null;
}


// DRAG AND DROP reorder
let dragSrcIdx = null;
function dragStart(e, idx){
  dragSrcIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.style.opacity = '0.5';
}
function dragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function dragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}
function dragDrop(e, targetIdx){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(dragSrcIdx === null || dragSrcIdx === targetIdx) return;
  // Swap players in array
  const tmp = players[dragSrcIdx];
  players[dragSrcIdx] = players[targetIdx];
  players[targetIdx] = tmp;
  dragSrcIdx = null;
  save();
  renderMain();
}

      ${m}
    </button>`).join('');
}
function setMode(m){activeMode=m;renderTabs();renderMain()}

// MAIN
function renderMain(){
  const el=document.getElementById('main');
  activeMode==='Overall'?renderLeaderboard(el):renderTierList(el,activeMode);
}

function renderLeaderboard(el){
  const sorted=[...players].map((p,i)=>({p,i,score:getScore(p)})).sort((a,b)=>b.score-a.score);
  let h=`<div class="lb-header">
    <div class="lb-title">Overall Leaderboard</div>
    ${editMode?`<button class="add-btn" onclick="openModal()">+ Add Player</button>`:''}
  </div>
  <div class="search-wrap">
    <span class="search-ico">&#128269;</span>
    <input type="text" id="srch" placeholder="Search player..." oninput="filterLB()">
  </div>`;

  if(!sorted.length){
    h+=`<div class="empty-state"><b>No players yet</b>Enable editor mode to start adding players.</div>`;
    el.innerHTML=h;return;
  }

  h+=`<div id="lbBody" class="lb-list">`;

  sorted.forEach(({p,i},rank)=>{
    const rc=rank===0?'r1':rank===1?'r2':rank===2?'r3':'';
    const ov=getOverall(p);
    const accentClass='accent-'+(ov||'none');
    const modesHtml=MODES.map(m=>{const t=getTier(p,m);return t?tierBadge(t,m):''}).join('');
    const rankNum=rank===0?'1':rank===1?'2':rank===2?'3':`${rank+1}`;
    const dragAttrs=editMode?`draggable="true" ondragstart="dragStart(event,${i})" ondragover="dragOver(event)" ondrop="dragDrop(event,${i})" ondragleave="dragLeave(event)"`:'';
    h+=`<div class="lb-row ${accentClass}" data-name="${p.name.toLowerCase()}" data-idx="${i}" ${dragAttrs}>
      <div class="rank-cell ${rc}">${rankNum}</div>
      <div class="player-card-cell">
        <div class="player-card" onclick="${editMode?`openModal(${i})`:''}" style="${editMode?'cursor:pointer':''}">
          <div class="skin-banner" style="${rank<=2?`background:${skinBannerColorByRank(rank)}`:`background:rgba(255,255,255,0.03)`}">
            <img src="${p.photo||SKIN(p.name)}" alt="${p.name}" onerror="this.style.opacity=0.15" style="width:56px;height:56px;object-fit:cover;image-rendering:${p.photo?'auto':'pixelated'}">
          </div>
          <div class="player-info">
            <div class="player-name">${p.name}</div>
            <div class="player-sub">
              ${rankLogo(p)?`<img src="${rankLogo(p)}" style="width:14px;height:14px;object-fit:contain;vertical-align:middle;margin-right:2px" alt="">`:'' }
              <span>${rankLabel(p)}</span>
              <span style="color:var(--muted2);font-size:13px">(${getScore(p)} pts)</span>
            </div>
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;padding:0 16px;flex-shrink:0;">
        <span class="region-badge reg-${p.region||'ID'}">${p.region||'ID'}</span>
      </div>
      <div class="tiers-cell">
        <div class="tiers-row">${modesHtml||'<span style="color:var(--muted2);font-size:12px">—</span>'}</div>
      </div>
      ${editMode?`<div style="display:flex;align-items:center;padding:0 12px;color:var(--muted);font-size:16px;cursor:grab;flex-shrink:0;" title="Drag to pindah posisi">&#9776;</div>`:''}
    </div>`;
  });
  h+=`</div>`;
  el.innerHTML=h;
}

function skinBannerColor(t){
  return'#1a1d24';
}
function skinBannerColorByRank(rank){
  if(rank===0) return'linear-gradient(135deg,#7a5c00,#c9960c,#f5c842,#c9960c,#7a5c00)'; // gold
  if(rank===1) return'linear-gradient(135deg,#4a4a4a,#9a9a9a,#c8c8c8,#9a9a9a,#4a4a4a)'; // silver
  if(rank===2) return'linear-gradient(135deg,#5c2e00,#a05a1a,#c87832,#a05a1a,#5c2e00)'; // bronze
  return'#1a1d24';
}

function filterLB(){
  const q=(document.getElementById('srch')||{value:''}).value.toLowerCase();
  document.querySelectorAll('#lbBody tr').forEach(r=>{
    r.style.display=(!q||r.dataset.name.includes(q))?'':'none';
  });
}

function renderTierList(el,mode){
  let h=`<div class="lb-header">
    <div class="lb-title">${mode} — Tier List</div>
    ${editMode?`<button class="add-btn" onclick="openModal()">+ Add Player</button>`:''}
  </div><div class="tierlist-wrap">`;

  TIERS.forEach(tier=>{
    const inTier=players.map((p,i)=>({p,i})).filter(({p})=>getTier(p,mode)===tier);
    h+=`<div class="tier-row">
      <div class="tier-label ${tier}">${tier}</div>
      <div class="tier-players-wrap">`;
    if(!inTier.length&&!editMode) h+=`<span class="empty-tier">Kosong</span>`;
    inTier.forEach(({p,i})=>{
      h+=`<div class="pchip" ${editMode?`onclick="openModal(${i})"`:''}">
        <img class="chip-skin" src="${p.photo||SKIN(p.name)}" alt="${p.name}" onerror="this.style.opacity=0.15" style="object-fit:cover;image-rendering:${p.photo?'auto':'pixelated'}">
        <div>
          <div class="chip-name">${p.name}</div>
          <div class="chip-reg">${p.region||'ID'}</div>
        </div>
      </div>`;
    });
    if(editMode) h+=`<button class="add-chip" onclick="openModal();setTimeout(()=>{var el=document.getElementById('m_${mode}');if(el)el.value='${tier}'},60)">+ Add</button>`;
    h+=`</div></div>`;
  });
  h+=`</div>`;
  el.innerHTML=h;
}

function requestEdit(){
  if(editMode){
    editMode=false;
    document.getElementById('editBtn').classList.remove('on');
    document.getElementById('editBtn').innerHTML='&#9998; Editor';
    renderMain();return;
  }
  document.getElementById('unInput').value='';
  document.getElementById('pwInput').value='';
  document.getElementById('pwErr').textContent='';
  document.getElementById('pwOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('unInput').focus(),80);
}
function checkPw(){
  const un=document.getElementById('unInput').value;
  const pw=document.getElementById('pwInput').value;
  if(un===EDITOR_UN && pw===EDITOR_PW){
    document.getElementById('pwOverlay').classList.remove('open');
    editMode=true;
    document.getElementById('editBtn').classList.add('on');
    document.getElementById('editBtn').innerHTML='&#128274; Keluar editor';
    renderMain();
  } else {
    document.getElementById('pwErr').textContent='Wrong username or password';
    document.getElementById('pwInput').value='';
  }
}

// MODAL
function buildModeGrid(){
  document.getElementById('modeGrid').innerHTML=MODES.map(m=>`
    <div class="mode-field">
      <label>${m}</label>
      <select id="m_${m}">
        <option value="-">— Unranked</option>
        ${TIERS.map(t=>`<option value="${t}">${t}</option>`).join('')}
      </select>
    </div>`).join('');
}
function openModal(idx=null){
  if(!editMode)return;
  editIdx=idx;
  buildModeGrid();
  const p=idx!==null?players[idx]:null;
  document.getElementById('modalTitle').textContent=p?'Edit Player':'Add Player';
  document.getElementById('delBtn').style.display=p?'block':'none';
  document.getElementById('ignInput').value=p?p.name:'';
  document.getElementById('regionSel').value=p?(p.region||'ID'):'ID';
  document.getElementById('skinPrev').style.display=p?'block':'none';
  window._uploadedPhoto=p&&p.photo?p.photo:null;
  window._uploadedRankLogo=p&&p.customRankLogo?p.customRankLogo:null;
  const rankInput=document.getElementById('customRankInput');
  if(rankInput) rankInput.value=p?(p.customRank||''):'';
  const rlPrev=document.getElementById('rankLogoPreview');
  const rlRmBtn=document.getElementById('rankLogoRemoveBtn');
  if(p&&p.customRankLogo){if(rlPrev){rlPrev.src=p.customRankLogo;rlPrev.style.display='block';}if(rlRmBtn)rlRmBtn.style.display='block';}
  else{if(rlPrev)rlPrev.style.display='none';if(rlRmBtn)rlRmBtn.style.display='none';}
  // init preset buttons
  const imgCM=document.getElementById('imgCM');
  const imgCA=document.getElementById('imgCA');
  if(imgCM) imgCM.src=RANK_LOGOS['Combat Master']||'';
  if(imgCA) imgCA.src=RANK_LOGOS['Combat Ace']||'';
  const photoPrev=document.getElementById('photoPreview');
  const photoRmBtn=document.getElementById('photoRemoveBtn');
  if(p&&p.photo){photoPrev.src=p.photo;photoPrev.style.display='block';photoRmBtn.style.display='block';}
  else{photoPrev.style.display='none';photoRmBtn.style.display='none';}
  document.getElementById('photoUpload').value='';
  document.getElementById('skinHint').textContent=p?'Skin dari Mojang/NameMC':'Type username to muat skin otomatis dari Mojang';
  if(p){
    document.getElementById('skinPrev').src=SKIN_BIG(p.name);
    MODES.forEach(m=>{const el=document.getElementById('m_'+m);if(el)el.value=p.tiers[m]||'-'});
  }
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('ignInput').focus(),60);
}
function closeModal(){document.getElementById('overlay').classList.remove('open');editIdx=null}
function onPhotoUpload(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const prev=document.getElementById('photoPreview');
    const rmBtn=document.getElementById('photoRemoveBtn');
    prev.src=e.target.result;prev.style.display='block';
    rmBtn.style.display='block';
    window._uploadedPhoto=e.target.result;
  };
  reader.readAsDataURL(file);
}
function removePhoto(){
  window._uploadedPhoto=null;
  const prev=document.getElementById('photoPreview');
  const rmBtn=document.getElementById('photoRemoveBtn');
  prev.style.display='none';rmBtn.style.display='none';
  document.getElementById('photoUpload').value='';
}
function onIGN(){
  clearTimeout(skinTimer);
  const ign=document.getElementById('ignInput').value.trim();
  const prev=document.getElementById('skinPrev');
  const hint=document.getElementById('skinHint');
  if(!ign){prev.style.display='none';hint.textContent='Type username to muat skin otomatis dari Mojang';return}
  hint.textContent='Loading skin...';
  skinTimer=setTimeout(()=>{
    prev.src=SKIN_BIG(ign);prev.style.display='block';
    prev.onload=()=>hint.textContent='Skin berhasil dimuat (Mojang/NameMC)';
    prev.onerror=()=>{prev.style.display='none';hint.textContent='Username tidak ditemukan di Mojang'};
  },500);
}

function setRankPreset(val){
  const inp=document.getElementById('customRankInput');
  if(inp) inp.value=val;
  // highlight active button
  ['btnCM','btnCA'].forEach(id=>{
    const b=document.getElementById(id);
    if(b) b.style.borderColor=val&&b.textContent.trim().includes(val)?'var(--accent2)':'var(--border2)';
  });
}
function onRankLogoUpload(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const prev=document.getElementById('rankLogoPreview');
    const rmBtn=document.getElementById('rankLogoRemoveBtn');
    if(prev){prev.src=e.target.result;prev.style.display='block';}
    if(rmBtn)rmBtn.style.display='block';
    window._uploadedRankLogo=e.target.result;
  };
  reader.readAsDataURL(file);
}
function removeRankLogo(){
  window._uploadedRankLogo=null;
  const prev=document.getElementById('rankLogoPreview');
  const rmBtn=document.getElementById('rankLogoRemoveBtn');
  if(prev)prev.style.display='none';
  if(rmBtn)rmBtn.style.display='none';
  document.getElementById('rankLogoUpload').value='';
}
function doSave(){
  const name=document.getElementById('ignInput').value.trim();
  if(!name)return;
  const region=document.getElementById('regionSel').value;
  const tiers={};
  MODES.forEach(m=>{const el=document.getElementById('m_'+m);tiers[m]=el?el.value:'-'});
  const photo=window._uploadedPhoto||null;
  const customRankRaw=(document.getElementById('customRankInput')||{value:''}).value.trim();
  const customRank=customRankRaw||null;
  const customRankLogo=window._uploadedRankLogo||null;
  if(editIdx!==null)players[editIdx]={name,region,tiers,photo,customRank,customRankLogo};
  else players.push({name,region,tiers,photo,customRank,customRankLogo});
  save();closeModal();renderMain();
}
function doDelete(){
  if(editIdx===null)return;
  if(!confirm(`Delete ${players[editIdx].name}?`))return;
  players.splice(editIdx,1);
  save();closeModal();renderMain();
}

document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.getElementById('pwOverlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open')});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();document.getElementById('pwOverlay').classList.remove('open')}});

renderTabs();
(async()=>{
  // Displaykan loading
  document.getElementById('main').innerHTML = '<div style="text-align:center;padding:60px;color:#64748b;font-family:Inter,sans-serif">⏳ Loading data...</div>';
  if(JSONBIN_BIN_ID !== 'PASTE_BIN_ID_DISINI'){
    players = await jbGet();
  } else {
    players = JSON.parse(localStorage.getItem('smptiers2_players')||'[]');
  }
  renderMain();
})();
</script>
